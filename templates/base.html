<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}TaskManager{% endblock %}</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f0f2f5; color: #333; }
        nav { background: #2c3e50; color: white; padding: 0 20px; display: flex; align-items: center; justify-content: space-between; height: 56px; }
        nav a { color: white; text-decoration: none; margin-left: 16px; font-size: 14px; }
        nav a:hover { color: #3498db; }
        .nav-brand { font-size: 18px; font-weight: bold; color: #3498db !important; }
        .container { max-width: 1100px; margin: 30px auto; padding: 0 20px; }
        .card { background: white; border-radius: 8px; padding: 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); margin-bottom: 20px; }
        .btn { display: inline-block; padding: 8px 16px; border-radius: 5px; border: none; cursor: pointer; font-size: 14px; text-decoration: none; }
        .btn-primary { background: #3498db; color: white; }
        .btn-danger { background: #e74c3c; color: white; }
        .btn-success { background: #2ecc71; color: white; }
        .btn-secondary { background: #95a5a6; color: white; }
        .btn:hover { opacity: 0.85; }
        .badge { display: inline-block; padding: 3px 9px; border-radius: 12px; font-size: 12px; font-weight: bold; }
        .badge-high { background: #fde8e8; color: #c0392b; }
        .badge-medium { background: #fef9e7; color: #d68910; }
        .badge-low { background: #e8f8f5; color: #1e8449; }
        .badge-pending { background: #eaf2ff; color: #2471a3; }
        .badge-in_progress { background: #fff3cd; color: #856404; }
        .badge-completed { background: #d4edda; color: #155724; }
        .messages { margin-bottom: 16px; }
        .alert { padding: 10px 16px; border-radius: 5px; margin-bottom: 8px; }
        .alert-success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .alert-error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        form input, form select, form textarea { width: 100%; padding: 8px 12px; border: 1px solid #ddd; border-radius: 5px; font-size: 14px; margin-top: 4px; }
        form label { font-size: 14px; font-weight: bold; color: #555; }
        .form-group { margin-bottom: 16px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 10px 14px; text-align: left; border-bottom: 1px solid #eee; font-size: 14px; }
        th { background: #f8f9fa; font-weight: bold; color: #555; }
        tr:hover { background: #f8f9fa; }
        .stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 24px; }
        .stat-card { background: white; padding: 20px; border-radius: 8px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .stat-card .number { font-size: 32px; font-weight: bold; color: #3498db; }
        .stat-card .label { color: #777; font-size: 13px; margin-top: 4px; }
        .filter-bar { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
        .filter-bar input, .filter-bar select { width: auto; flex: 1; min-width: 140px; }
    </style>
</head>
<body>
<nav>
    <a href="/" class="nav-brand">✅ TaskManager</a>
    <div>
        {% if user.is_authenticated %}
            <a href="/">Dashboard</a>
            <a href="/tasks/">Tasks</a>
            <a href="/categories/">Categories</a>
            <a href="/tags/">Tags</a>
            <a href="/admin/">Admin</a>
            <a href="/accounts/logout/">Logout ({{ user.username }})</a>
        {% else %}
            <a href="/accounts/login/">Login</a>
            <a href="/accounts/register/">Register</a>
        {% endif %}
    </div>
</nav>
<div class="container">
    {% if messages %}
    <div class="messages">
        {% for message in messages %}
        <div class="alert alert-{{ message.tags }}">{{ message }}</div>
        {% endfor %}
    </div>
    {% endif %}
    {% block content %}{% endblock %}
</div>
</body>
</html>
