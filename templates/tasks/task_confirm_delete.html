{% extends 'base.html' %}
{% block title %}Delete Task - TaskManager{% endblock %}
{% block content %}
<div class="card" style="max-width:480px;margin:0 auto;text-align:center;">
    <h2 style="margin-bottom:12px;">Delete Task</h2>
    <p>Are you sure you want to delete <strong>"{{ task.title }}"</strong>?</p>
    <p style="color:#e74c3c;font-size:13px;margin:8px 0 20px;">This action cannot be undone.</p>
    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Yes, Delete</button>
        <a href="/tasks/" class="btn btn-secondary" style="margin-left:10px;">Cancel</a>
    </form>
</div>
{% endblock %}
