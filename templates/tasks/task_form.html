{% extends 'base.html' %}
{% block title %}{{ action }} Task - TaskManager{% endblock %}
{% block content %}
<div class="card" style="max-width:600px;margin:0 auto;">
    <h2 style="margin-bottom:20px;">{{ action }} Task</h2>
    <form method="post">
        {% csrf_token %}
        {% for field in form %}
        <div class="form-group">
            <label>{{ field.label }}</label>
            {{ field }}
            {% if field.errors %}<p style="color:red;font-size:12px;margin-top:4px;">{{ field.errors.0 }}</p>{% endif %}
        </div>
        {% endfor %}
        <div style="display:flex;gap:10px;margin-top:10px;">
            <button type="submit" class="btn btn-primary">{{ action }} Task</button>
            <a href="/tasks/" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
