{% extends 'base.html' %}
{% block title %}Register - TaskManager{% endblock %}
{% block content %}
<div class="card" style="max-width:400px;margin:40px auto;">
    <h2 style="text-align:center;margin-bottom:24px;">Create Account</h2>
    <form method="post">
        {% csrf_token %}
        {% for field in form %}
        <div class="form-group">
            <label>{{ field.label }}</label>
            {{ field }}
            {% if field.errors %}<p style="color:red;font-size:12px;">{{ field.errors.0 }}</p>{% endif %}
        </div>
        {% endfor %}
        <button type="submit" class="btn btn-primary" style="width:100%;margin-top:8px;">Register</button>
    </form>
    <p style="text-align:center;margin-top:16px;font-size:14px;">Already have an account? <a href="/accounts/login/">Login</a></p>
</div>
{% endblock %}
